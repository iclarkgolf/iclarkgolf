<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
html,body{overflow-x:hidden;max-width:100%;}
body{font-family:'Nunito',sans-serif;background:#f4faf7;color:#1a1a2e;min-height:100vh;padding-bottom:calc(80px + env(safe-area-inset-bottom));}
a{text-decoration:none;color:inherit;}
:root{
  --green:#1D9E75;--green2:#9FE1CB;--green-pale:#E1F5EE;--green-border:#c8edd9;
  --purple:#534AB7;--white:#ffffff;
  --gray-100:#f4f4f5;--gray-200:#e4e4e7;--gray-400:#a1a1aa;--gray-600:#52525b;--gray-900:#18181b;
  --radius:16px;--radius-sm:10px;--radius-full:100px;
}
.nav{position:sticky;top:0;z-index:200;background:var(--white);border-bottom:1px solid var(--green-border);
  padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;
  background:linear-gradient(135deg,var(--green),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-back{font-size:13px;font-weight:700;color:var(--gray-600);}
.lang-btn{font-size:11px;padding:4px 9px;border:1px solid var(--gray-200);border-radius:6px;background:#fff;cursor:pointer;font-weight:700;font-family:'Nunito',sans-serif;}
.lang-btn.on{background:var(--green);color:#fff;border-color:var(--green);}
.page-header{background:linear-gradient(135deg,#1D9E75,#534AB7);padding:28px 20px 24px;text-align:center;}
.page-header h1{font-size:24px;font-weight:800;color:#fff;margin-bottom:6px;}
.page-header p{font-size:13px;color:rgba(255,255,255,.85);font-weight:600;}
.upload-bar{padding:12px 16px;display:flex;justify-content:center;}
.upload-btn{background:linear-gradient(135deg,var(--green),var(--purple));color:#fff;border:none;
  border-radius:var(--radius-full);padding:13px 28px;font-family:'Nunito',sans-serif;
  font-size:14px;font-weight:800;cursor:pointer;min-height:48px;width:100%;max-width:420px;
  display:flex;align-items:center;justify-content:center;gap:8px;}
.gallery-header{display:flex;align-items:center;padding:4px 16px 8px;}
.gallery-count-label{font-size:13px;font-weight:700;color:var(--gray-600);}
.gallery-count-label span{color:var(--green);}

/* ── 2줄 가로스크롤 ── */
.g-scroll{padding:0 16px 8px;}
.g-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
@media(min-width:480px){.g-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:768px){.g-grid{grid-template-columns:repeat(4,1fr);}}
@media(min-width:1100px){.g-grid{grid-template-columns:repeat(5,1fr);}}
.g-card{background:#fff;border:1.5px solid var(--gray-200);
  border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s;}
.g-card:hover{border-color:var(--green-border);transform:translateY(-2px);}
.g-thumb{height:160px;overflow:hidden;background:var(--gray-100);display:flex;align-items:center;justify-content:center;}
.g-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;}
.g-card:hover .g-thumb img{transform:scale(1.05);}
.g-body{padding:10px 12px;}
.g-title{font-size:13px;font-weight:700;color:var(--gray-900);margin-bottom:4px;
  display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
.g-desc{font-size:11px;color:var(--gray-400);line-height:1.5;margin-bottom:6px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.g-comment-preview{font-size:11px;color:var(--green);line-height:1.5;margin-top:6px;padding-top:6px;
  border-top:1px dashed var(--gray-200);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
.g-comment-preview b{color:var(--gray-900);}
.g-meta{font-size:11px;color:var(--gray-400);display:flex;justify-content:space-between;}
.g-loading,.g-empty{padding:40px;text-align:center;color:var(--gray-400);font-size:14px;}

.more-btn{display:none;margin:12px 16px 0;cursor:pointer;
  align-items:center;justify-content:center;gap:6px;
  background:#fff;border:1.5px solid var(--green-border);border-radius:var(--radius-full);
  padding:13px 20px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:var(--green);}

/* 업로드 모달 */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.upload-sheet{background:#fff;border-radius:24px 24px 0 0;padding:24px 20px calc(40px + env(safe-area-inset-bottom));width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.sheet-handle{width:40px;height:4px;background:var(--gray-200);border-radius:10px;margin:0 auto 20px;}
.sheet-title{font-size:17px;font-weight:800;color:var(--gray-900);margin-bottom:10px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;font-weight:700;color:var(--gray-600);margin-bottom:6px;display:block;}
.form-input{width:100%;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  padding:12px 14px;font-family:'Nunito',sans-serif;font-size:16px;color:var(--gray-900);outline:none;resize:vertical;}
.form-input:focus{border-color:var(--green);}
.form-hint{font-size:11px;color:var(--gray-400);margin-top:4px;}
.sheet-btns{display:flex;gap:10px;margin-top:20px;}
.btn-cancel{flex:1;padding:13px;border:1.5px solid var(--gray-200);border-radius:var(--radius-full);
  background:#fff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--gray-600);cursor:pointer;}
.btn-submit{flex:2;padding:13px;background:linear-gradient(135deg,var(--green),var(--purple));
  border:none;border-radius:var(--radius-full);font-family:'Nunito',sans-serif;
  font-size:14px;font-weight:800;color:#fff;cursor:pointer;}

/* 상세 모달 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:600;
  align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal-box{background:#fff;border-radius:var(--radius);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal-img{width:100%;height:280px;object-fit:cover;background:var(--gray-100);}
.modal-body{padding:20px;}
.modal-title{font-size:18px;font-weight:800;color:var(--gray-900);margin-bottom:6px;}
.modal-nick{font-size:12px;color:var(--gray-400);margin-bottom:10px;}
.modal-desc{font-size:14px;color:var(--gray-600);line-height:1.7;margin-bottom:12px;white-space:pre-line;}
.modal-translate{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 16px;margin-bottom:16px;min-height:38px;
  background:var(--green-pale);color:var(--green);border:1.5px solid var(--green-border);border-radius:var(--radius-full);
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;touch-action:manipulation;}
.modal-translate.loading{opacity:.6;pointer-events:none;}
.modal-actions{display:flex;gap:10px;}
.modal-like{flex:1;padding:12px;background:var(--green-pale);border:1.5px solid var(--green-border);
  border-radius:var(--radius-full);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--green);cursor:pointer;}
.modal-close-btn{flex:1;padding:12px;background:var(--gray-100);border:none;
  border-radius:var(--radius-full);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--gray-600);cursor:pointer;}

/* 댓글 */
.comment-section{margin-top:20px;padding-top:16px;border-top:1px solid var(--gray-200);}
.comment-header{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:800;color:var(--gray-900);margin-bottom:10px;}
.comment-header #comment-count{color:var(--gray-400);font-weight:700;}
.comment-translate-btn{margin-left:auto;display:inline-flex;align-items:center;gap:4px;padding:5px 10px;min-height:32px;
  background:var(--green-pale);color:var(--green);border:1.5px solid var(--green-border);border-radius:var(--radius-full);
  font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;cursor:pointer;touch-action:manipulation;}
.comment-translate-btn.loading{opacity:.6;pointer-events:none;}
.comment-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;max-height:240px;overflow-y:auto;}
.comment-empty{font-size:12px;color:var(--gray-400);text-align:center;padding:14px 0;}
.comment-item{background:var(--gray-100);border-radius:12px;padding:10px 12px;}
.comment-nick{font-size:12px;font-weight:800;color:var(--green);margin-bottom:3px;}
.comment-text{font-size:13px;color:var(--gray-900);line-height:1.6;white-space:pre-line;}
.comment-form{display:flex;flex-direction:column;gap:8px;}
.comment-input-nick{width:100%;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  padding:10px 12px;font-family:'Nunito',sans-serif;font-size:16px;color:var(--gray-900);outline:none;}
.comment-input-row{display:flex;gap:8px;}
@media(max-width:340px){.comment-input-row{flex-direction:column;}.comment-submit{width:100%;}}
.comment-input-text{flex:1;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  padding:10px 12px;font-family:'Nunito',sans-serif;font-size:16px;color:var(--gray-900);outline:none;min-width:0;}
.comment-submit{padding:10px 16px;min-height:44px;background:var(--green);color:#fff;border:none;
  border-radius:var(--radius-sm);font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;touch-action:manipulation;white-space:nowrap;}

.fixed-bottom{position:fixed;bottom:0;left:0;right:0;z-index:400;
  display:flex;padding:10px 16px calc(16px + env(safe-area-inset-bottom));gap:8px;background:#fff;border-top:1px solid var(--green-border);}
.fixed-btn{display:flex;align-items:center;justify-content:center;gap:6px;flex:1;
  padding:13px;border-radius:var(--radius-full);font-family:'Nunito',sans-serif;
  font-size:13px;font-weight:800;text-decoration:none;min-height:48px;border:none;cursor:pointer;}
</style>
</head>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, orderBy, query, where, updateDoc, doc, increment }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCWoLpUqJ0qhVi3pFlfeB_aSIY4wtmy4qU",
  authDomain:"iclarkgolf.firebaseapp.com",
  projectId:"iclarkgolf",
  storageBucket:"iclarkgolf.firebasestorage.app",
  messagingSenderId:"503239213724",
  appId:"1:503239213724:web:c136e25e0cd22c170e6359"
});
const db = getFirestore(app);
const col = collection(db, 'gallery');
const commentsCol = collection(db, 'gallery_comments');
window._db = db; window._col = col;
window._firestore = { updateDoc, doc, increment };

function makeCard(p) {
  const card = document.createElement('div');
  card.className = 'g-card';
  card.onclick = () => openModal(p.id, p.imgUrl, p.title, p.nickname, p.likes||0, p.desc||'');
  card.innerHTML = `
    <div class="g-thumb">
      <img src="${p.imgUrl}" alt="${esc(p.title)}" loading="lazy"
        onerror="this.parentElement.innerHTML='<div style=\\'display:flex;align-items:center;justify-content:center;height:100%;font-size:36px;\\'>📷</div>'">
    </div>
    <div class="g-body">
      <div class="g-title">${esc(p.title)}</div>
      ${p.desc ? `<div class="g-desc">${esc(p.desc)}</div>` : ''}
      <div class="g-meta"><span>👤 ${esc(p.nickname)}</span><span>❤️ <span id="likes-${p.id}">${p.likes||0}</span></span></div>
      <div class="g-comment-preview" id="preview-${p.id}"></div>
    </div>`;
  return card;
}

window.loadPosts = async function() {
  const scrl = document.getElementById('g-scroll');
  const moreBtn = document.getElementById('more-btn');
  const countEl = document.getElementById('gallery-count');
  scrl.innerHTML = '<div class="g-loading">'+t('g.loading')+'</div>';
  try {
    let snap;
    try { snap = await getDocs(query(col, orderBy('createdAt','desc'))); }
    catch(e) { snap = await getDocs(col); }

    if (snap.empty) {
      scrl.innerHTML = '<div class="g-empty">'+t('g.empty')+'</div>';
      if(countEl) countEl.textContent = (currentLang==='en') ? '0' : '0개';
      if(moreBtn) moreBtn.style.display='none';
      return;
    }

    const all = [];
    snap.forEach(d => all.push({id:d.id,...d.data()}));
    all.sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));

    if(countEl) countEl.textContent = (currentLang==='en') ? all.length : all.length+'개';

    const limit = window.innerWidth < 640 ? 4 : 10;
    const list = window._showAll ? all : all.slice(0, limit);

    if(moreBtn) {
      if(!window._showAll && all.length > limit) {
        moreBtn.style.display = 'flex';
        moreBtn.textContent = t('more.btn.n').replace('{n}', all.length);
      } else {
        moreBtn.style.display = 'none';
      }
    }

    // 그리드 렌더링
    scrl.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = 'g-grid';
    list.forEach(p => grid.appendChild(makeCard(p)));
    scrl.appendChild(grid);
    loadCommentPreviews(list.map(p=>p.id));

  } catch(e) {
    scrl.innerHTML = '<div class="g-empty">'+t('g.loaderr')+' <button onclick="loadPosts()" style="padding:8px 16px;border-radius:100px;border:1.5px solid #c8edd9;background:#E1F5EE;color:#085041;font-weight:700;cursor:pointer;margin-top:8px;">'+t('g.retry')+'</button></div>';
  }
};

window.submitPost = async function() {
  const title=document.getElementById('f-title').value.trim();
  const nick=document.getElementById('f-nick').value.trim();
  const desc=document.getElementById('f-desc').value.trim();
  let imgUrl=document.getElementById('f-imgurl').value.trim();
  const fileInput=document.getElementById('f-file');
  const btn=document.getElementById('submit-btn');
  if(!title||!nick){alert(t('alert.required'));return;}
  btn.disabled=true;
  if(fileInput.files&&fileInput.files[0]){
    btn.textContent=t('btn.uploading');
    document.getElementById('upload-status').textContent=t('status.uploading');
    try{
      const fd=new FormData();fd.append('image',fileInput.files[0]);
      const res=await fetch('https://api.imgbb.com/1/upload?key=b59ca0d334f2bbbc8e26c620c0936cf5',{method:'POST',body:fd});
      const data=await res.json();
      if(data.success){imgUrl=data.data.url;document.getElementById('upload-status').textContent=t('status.done');}
      else{alert(t('alert.uploadfail'));btn.textContent=t('up.submit');btn.disabled=false;return;}
    }catch(e){alert(t('alert.uploaderr'));btn.textContent=t('up.submit');btn.disabled=false;return;}
  }
  if(!imgUrl||!imgUrl.startsWith('http')){alert(t('alert.needphoto'));btn.textContent=t('up.submit');btn.disabled=false;return;}
  btn.textContent=t('btn.saving');
  try{
    await addDoc(col,{title,imgUrl,nickname:nick,desc,likes:0,createdAt:new Date().toISOString()});
    closeUpload();
    ['f-title','f-imgurl','f-nick','f-desc'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-file').value='';
    document.getElementById('img-preview-wrap').style.display='none';
    document.getElementById('img-placeholder').style.display='block';
    document.getElementById('upload-status').textContent=t('status.default');
    await loadPosts();
  }catch(e){alert(t('alert.savefail')+e.message);}
  btn.textContent=t('up.submit');btn.disabled=false;
};

window.likePost = async function(id) {
  try{
    const {updateDoc,doc,increment}=window._firestore;
    await updateDoc(doc(db,'gallery',id),{likes:increment(1)});
    const el=document.getElementById('likes-'+id);if(el)el.textContent=parseInt(el.textContent||0)+1;
    const ml=document.getElementById('modal-likes');if(ml)ml.textContent=parseInt(ml.textContent||0)+1;
  }catch(e){}
};

// ── 댓글 ──
// ── 카드 목록에 최신 댓글 미리보기 표시 (전체 댓글 1회 조회 후 postId별로 최신 것만 추출) ──
window.loadCommentPreviews = async function(postIds) {
  try{
    const snap = await getDocs(commentsCol);
    const all = [];
    snap.forEach(d => all.push(d.data()));
    all.sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
    const latestByPost = {};
    const countByPost = {};
    all.forEach(c => {
      countByPost[c.postId] = (countByPost[c.postId]||0) + 1;
      if(!latestByPost[c.postId]) latestByPost[c.postId] = c;
    });
    postIds.forEach(id => {
      const el = document.getElementById('preview-'+id);
      if(!el) return;
      const c = latestByPost[id];
      if(!c){ el.style.display='none'; return; }
      const extra = countByPost[id] > 1 ? ' 외 '+(countByPost[id]-1)+'개' : '';
      const extraEn = countByPost[id] > 1 ? ' +'+(countByPost[id]-1)+' more' : '';
      el.innerHTML = '💬 <b>'+esc(c.nickname)+'</b> '+esc(c.text)+'<span style="color:var(--gray-400);">'+(currentLang==='en'?extraEn:extra)+'</span>';
      el.style.display = 'block';
    });
  }catch(e){}
};

window.loadComments = async function(postId) {
  const listEl = document.getElementById('comment-list');
  const countEl = document.getElementById('comment-count');
  const tbtn = document.getElementById('comment-translate-btn');
  listEl.innerHTML = '<div class="comment-empty">'+t('g.loading')+'</div>';
  try{
    const snap = await getDocs(query(commentsCol, where('postId','==',postId)));
    const list = [];
    snap.forEach(d => list.push({id:d.id, ...d.data()}));
    list.sort((a,b)=>(a.createdAt||'').localeCompare(b.createdAt||''));
    window._modalComments = list;
    window._modalCommentsTranslated = null;
    window._modalCommentsShowingTranslated = false;
    countEl.textContent = list.length;
    tbtn.style.display = list.length ? 'inline-flex' : 'none';
    tbtn.textContent = '🌐 '+t('translate.view');
    tbtn.classList.remove('loading');
    renderComments(list);
  }catch(e){
    listEl.innerHTML = '<div class="comment-empty">'+t('g.loaderr')+'</div>';
  }
};

window.renderComments = function(list){
  const listEl = document.getElementById('comment-list');
  if(!list.length){
    listEl.innerHTML = '<div class="comment-empty">'+t('comment.empty')+'</div>';
    return;
  }
  listEl.innerHTML = list.map(c => `
    <div class="comment-item">
      <div class="comment-nick">${esc(c.nickname)}</div>
      <div class="comment-text">${esc(c.text)}</div>
    </div>`).join('');
}

window.submitComment = async function() {
  const postId = window._modalId;
  const nick = document.getElementById('comment-nick').value.trim();
  const text = document.getElementById('comment-text').value.trim();
  if(!nick || !text){ alert(t('comment.required')); return; }
  try{
    await addDoc(commentsCol, {postId, nickname:nick, text, createdAt:new Date().toISOString()});
    localStorage.setItem('gallery_comment_nick', nick);
    document.getElementById('comment-text').value = '';
    await loadComments(postId);
    loadCommentPreviews([postId]);
  }catch(e){
    alert(t('comment.fail'));
  }
};

document.addEventListener('DOMContentLoaded',()=>{window._showAll=false;loadPosts();});
</script>

let currentLang = localStorage.getItem('clarkgo_lang') || 'kr';
function t(key){ return (TRANSLATIONS[currentLang] && TRANSLATIONS[currentLang][key]) || (TRANSLATIONS.kr[key]) || key; }
function setLang(lang){
  currentLang = lang;
  localStorage.setItem('clarkgo_lang', lang);
  applyTranslations();
  document.querySelectorAll('.lang-btn').forEach(btn=>{
    btn.classList.toggle('on', btn.textContent.trim().toLowerCase().startsWith(lang));
  });
  if (typeof loadPosts === 'function') loadPosts();
}
function applyTranslations(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key = el.getAttribute('data-i18n');
    const val = t(key);
    if (val) el.innerHTML = val;
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{
    const key = el.getAttribute('data-i18n-ph');
    const val = t(key);
    if (val) el.placeholder = val;
  });
}
document.addEventListener('DOMContentLoaded', ()=>{
  applyTranslations();
  document.querySelectorAll('.lang-btn').forEach(btn=>{
    btn.classList.toggle('on', btn.textContent.trim().toLowerCase().startsWith(currentLang));
  });
});

function previewFile(input){
  const file=input.files[0];if(!file)return;
  if(file.size>5*1024*1024){alert(t('alert.filesize'));input.value='';return;}
  const reader=new FileReader();
  reader.onload=e=>{
    document.getElementById('img-preview').src=e.target.result;
    document.getElementById('img-preview-wrap').style.display='block';
    document.getElementById('img-placeholder').style.display='none';
    document.getElementById('f-imgurl').value='';
    document.getElementById('upload-status').textContent=t('status.selected');
  };reader.readAsDataURL(file);
}
function clearFileSelect(){
  document.getElementById('f-file').value='';
  document.getElementById('img-preview-wrap').style.display='none';
  document.getElementById('img-placeholder').style.display='block';

function openModal(id,imgUrl,title,nick,likes,desc){
  window._modalId=id;
  window._modalOriginal={title,desc};
  window._modalTranslated=null;
  window._modalShowingTranslated=false;
  document.getElementById('modal-img').src=imgUrl;
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-nick').textContent='👤 '+nick;
  document.getElementById('modal-likes').textContent=likes;
  document.getElementById('modal-desc').textContent=desc||'';
  const tbtn=document.getElementById('modal-translate-btn');
  tbtn.textContent=t('translate.view');
  tbtn.classList.remove('loading');
  tbtn.style.display=(title||desc)?'inline-flex':'none';
  document.getElementById('comment-nick').value = localStorage.getItem('gallery_comment_nick') || '';
  document.getElementById('comment-text').value = '';
  loadComments(id);
  document.getElementById('modal-overlay').classList.add('open');

}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');document.body.style.overflow='';}
function modalOverlayClose(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

async function translateText(text, langpair){
  if(!text) return '';
  const res = await fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(text)+'&langpair='+langpair);
  const data = await res.json();
  return (data && data.responseData && data.responseData.translatedText) ? data.responseData.translatedText : text;
}

window.toggleTranslate = async function(){
  const tbtn = document.getElementById('modal-translate-btn');
  const titleEl = document.getElementById('modal-title');
  const descEl = document.getElementById('modal-desc');
  const orig = window._modalOriginal;

  // 원문으로 되돌리기
  if(window._modalShowingTranslated){
    titleEl.textContent = orig.title;
    descEl.textContent = orig.desc || '';
    tbtn.textContent = t('translate.view');
    window._modalShowingTranslated = false;
    return;
  }

  // 캐시된 번역이 있으면 재사용
  if(window._modalTranslated){
    titleEl.textContent = window._modalTranslated.title;
    descEl.textContent = window._modalTranslated.desc;
    tbtn.textContent = t('translate.original');
    window._modalShowingTranslated = true;
    return;
  }

  // 한글 포함 여부로 번역 방향 자동 판단
  const hasHangul = /[가-힣]/.test((orig.title||'') + (orig.desc||''));
  const langpair = hasHangul ? 'ko|en' : 'en|ko';

  tbtn.textContent = t('translate.loading');
  tbtn.classList.add('loading');
  try{
    const [tTitle, tDesc] = await Promise.all([
      translateText(orig.title, langpair),
      translateText(orig.desc, langpair)
    ]);
    window._modalTranslated = {title: tTitle, desc: tDesc};
    titleEl.textContent = tTitle;
    descEl.textContent = tDesc;
    tbtn.textContent = t('translate.original');
    window._modalShowingTranslated = true;
  }catch(e){
    alert(t('translate.fail'));
    tbtn.textContent = t('translate.view');
  }
  tbtn.classList.remove('loading');
};

window.toggleCommentsTranslate = async function(){
  const tbtn = document.getElementById('comment-translate-btn');
  const list = window._modalComments || [];
  if(!list.length) return;

  // 원문으로 되돌리기
  if(window._modalCommentsShowingTranslated){
    renderComments(list);
    tbtn.textContent = '🌐 '+t('translate.view');
    window._modalCommentsShowingTranslated = false;
    return;
  }

  // 캐시된 번역이 있으면 재사용
  if(window._modalCommentsTranslated){
    renderComments(window._modalCommentsTranslated);
    tbtn.textContent = '🌐 '+t('translate.original');
    window._modalCommentsShowingTranslated = true;
    return;
  }

  const hasHangul = /[가-힣]/.test(list.map(c=>c.text).join(' '));
  const langpair = hasHangul ? 'ko|en' : 'en|ko';

  tbtn.textContent = t('translate.loading');
  tbtn.classList.add('loading');
  try{
    const translatedTexts = await Promise.all(list.map(c => translateText(c.text, langpair)));
    const translatedList = list.map((c,i) => ({...c, text: translatedTexts[i]}));
    window._modalCommentsTranslated = translatedList;
    renderComments(translatedList);
    tbtn.textContent = '🌐 '+t('translate.original');
    window._modalCommentsShowingTranslated = true;
  }catch(e){
    alert(t('translate.fail'));
    tbtn.textContent = '🌐 '+t('translate.view');
  }
  tbtn.classList.remove('loading');
};
