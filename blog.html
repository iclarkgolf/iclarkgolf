  {id:"p1",title:"7·8월 여름 휴가, 골프 전지훈련으로 바꿔보세요 — 필리핀 클락 프라데라 완벽 가이드",cat:"패키지 안내",date:"2026.05.20",thumb:"https://iclarkgolf.com/images/pradera-golf-01.jpg",excerpt:"인천에서 비행기로 3시간 50분, 필리핀 클락에서 매일 라운드하고 매일 레슨받는 골프 전지훈련을 경험해보세요."}
];

const PER_PAGE = 12;
let filtered = [...POSTS];
let currentPage = 1;
let currentCat = '전체';

// 카테고리 추출
const cats = ['전체', ...new Set(POSTS.map(p => p.cat))];
const filterWrap = document.getElementById('filter-wrap');
cats.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (c === '전체' ? ' active' : '');
  btn.textContent = c;
  btn.onclick = () => {
    currentCat = c;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterPosts();
  };
  filterWrap.appendChild(btn);
});

function filterPosts() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  filtered = POSTS.filter(p => {
    const matchCat = currentCat === '전체' || p.cat === currentCat;
    const matchQ = !q || p.title.toLowerCase().includes(q) || p.excerpt.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  currentPage = 1;
  render();
}

function render() {
  const grid = document.getElementById('blog-grid');
  const start = (currentPage - 1) * PER_PAGE;
  const pageItems = filtered.slice(start, start + PER_PAGE);

  if (!pageItems.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">검색 결과가 없습니다 🔍</div>';
    document.getElementById('pg-wrap').innerHTML = '';
    return;
  }

  grid.innerHTML = pageItems.map(p => `
    <a href="/blog-${p.id}.html" class="blog-card">
      <div class="card-thumb">
        <img src="${p.thumb}" alt="${p.title}" loading="lazy" onerror="this.style.display='none'">
        <span class="card-cat">${p.cat}</span>
      </div>
      <div class="card-body">
        <div class="card-title">${p.title}</div>
        <div class="card-excerpt">${p.excerpt}</div>
        <div class="card-meta">
          <span>✍️ 투어장</span>
          <span>${p.date}</span>
        </div>
      </div>
    </a>
  `).join('');

  // 페이지네이션
  const totalPages = Math.ceil(filtered.length / PER_PAGE);
  const pg = document.getElementById('pg-wrap');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }
  pg.innerHTML = Array.from({length: totalPages}, (_, i) =>
    `<button class="pg-btn${i+1===currentPage?' active':''}" onclick="goPage(${i+1})">${i+1}</button>`
  ).join('');
}

function goPage(n) {
  currentPage = n;
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// 쿠키 배너
if (!localStorage.getItem('cookie_consent')) {
  document.getElementById('cookie-bar').style.display = 'flex';
}
function acceptCookie() {
  localStorage.setItem('cookie_consent', 'yes');
  document.getElementById('cookie-bar').style.display = 'none';
}
function denyCookie() {
  localStorage.setItem('cookie_consent', 'no');
  document.getElementById('cookie-bar').style.display = 'none';
}

render();
</script>
